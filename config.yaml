        - keyword: adverse weather
          keyword_cn: 恶劣天气
          query: computer vision in adverse weather conditions like rain, snow, and fog
        - keyword: spatial intelligence
          keyword_cn: 空间智能
          query: spatial intelligence and geometric deep learning
        - keyword: physics AI
          keyword_cn: 物理AI
          query: a
        - keyword: world model
          keyword_cn: 世界模型
          query: p
